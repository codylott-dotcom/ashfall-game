<!DOCTYPE html>

<html>

<head>

  <title>Ashfall</title>

</head>

<body>

<h1>ASHFALL</h1>

<pre id="game">Day 1

06:12

Weather: Cool and overcast

Location: Old Forest

Carl wakes beneath a pine tree.</pre>

<form id="form">

  <input id="command" placeholder="What is your intention?">

  <button type="submit">Enter</button>

</form>

<script>

let form = document.getElementById("form");

let input = document.getElementById("command");

let game = document.getElementById("game");

form.addEventListener("submit", function(event) {

  event.preventDefault();

  let command = input.value.trim();

  if (command !== "") {

  game.textContent += "\n\n> " + command;

  let lower = command.toLowerCase();

  if (lower.includes("look")) {

    game.textContent +=

    "\n\nCarl studies the forest." +

    "\nHe notices animal tracks in the mud." +

    "\nBirdsong comes from the east.";

  }

  input.value = "";

  }

});

</script>

</body>

</html>
