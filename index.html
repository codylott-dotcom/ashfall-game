<!DOCTYPE html>

<html>

<head>

<title>Ashfall</title>

</head>

<body>
  <h1>ASHFALL</h1>

<pre id="game">

Day 1

06:12

Weather: Cool and overcast

Location: Old Forest

Carl wakes beneath a pine tree.

</pre>

<input id="command" placeholder="What is your intention?">

<button onclick="submitCommand()">Enter</button>

<script>

document.getElementById("command").addEventListener("keydown", function(e) {

  if (e.key === "Enter") {

    let command = this.value;

    let game = document.getElementById("game");

    game.textContent += "\n\n> " + command;

    this.value = "";

  }

});

</script>
</body>

</html>
